pre-commit:
  parallel: true
  commands:
    lint:
      files: git diff --name-only HEAD
      glob: "*.{js,ts,jsx,tsx}"
      run: ESLINT_USE_FLAT_CONFIG=false npx eslint {files}
    types:
      files: git diff --name-only HEAD
      glob: "*.{js,ts,jsx,tsx}"
      run: npx tsc --noEmit
commit-msg:
  parallel: true
  commands:
    commitlint:
      run: npx commitlint --edit
